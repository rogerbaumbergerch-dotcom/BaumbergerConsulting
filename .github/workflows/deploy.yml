name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME: homepage-static

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-homepage-deploy

      - name: Delete stack if in ROLLBACK_COMPLETE state
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STATUS" == "ROLLBACK_COMPLETE" ]]; then
            echo "Stack is in ROLLBACK_COMPLETE state. Deleting before redeploy..."
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}"
            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}"
            echo "Stack deleted."
          else
            echo "Stack status: $STATUS — no cleanup needed."
          fi

      - name: Deploy CloudFormation stack
        run: |
          PARAMETER_OVERRIDES=()
          [[ -n "${{ secrets.DOMAIN_NAME }}" ]] && PARAMETER_OVERRIDES+=("DomainName=${{ secrets.DOMAIN_NAME }}")
          [[ -n "${{ secrets.HOSTED_ZONE_ID }}" ]] && PARAMETER_OVERRIDES+=("HostedZoneId=${{ secrets.HOSTED_ZONE_ID }}")
          [[ -n "${{ secrets.ACM_CERTIFICATE_ARN }}" ]] && PARAMETER_OVERRIDES+=("AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}")

          ARGS=(
            cloudformation deploy
            --stack-name "$STACK_NAME"
            --template-file template.yaml
            --region "${{ secrets.AWS_REGION }}"
            --capabilities CAPABILITY_NAMED_IAM
            --no-fail-on-empty-changeset
          )
          [[ ${#PARAMETER_OVERRIDES[@]} -gt 0 ]] && ARGS+=(--parameter-overrides "${PARAMETER_OVERRIDES[@]}")

          aws "${ARGS[@]}"

      - name: Get stack outputs
        id: cf
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "bucket=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="WebsiteBucketName") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "distribution=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "url=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="SiteUrl") | .OutputValue')" >> $GITHUB_OUTPUT

      - name: Sync static files to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.cf.outputs.bucket }} \
            --delete \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.cf.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf.outputs.distribution }} \
            --paths "/*"

      - name: Summary
        run: echo "Deployed to ${{ steps.cf.outputs.url }}"
