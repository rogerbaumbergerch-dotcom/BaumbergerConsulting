name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  STACK_NAME_RAW: ${{ vars.STACK_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-homepage-deploy

      - name: Normalize stack name
        run: |
          CANDIDATE="${STACK_NAME_RAW:-homepage-static}"
          # CloudFormation stack names may only contain letters, numbers, and hyphens.
          NORMALIZED="$(echo "$CANDIDATE" | tr '_' '-' | sed 's/[^a-zA-Z0-9-]//g')"

          if [[ -z "$NORMALIZED" ]]; then
            NORMALIZED="homepage-static"
          fi

          if [[ ! "$NORMALIZED" =~ ^[a-zA-Z] ]]; then
            NORMALIZED="h-$NORMALIZED"
          fi

          echo "STACK_NAME=$NORMALIZED" >> "$GITHUB_ENV"
          echo "Using stack name: $NORMALIZED"

      - name: Precheck stack state
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          # Deletes an orphaned OAC that was not cleaned up by a previous stack rollback or delete.
          # Safe to call when the stack does not (or no longer) owns the OAC.
          delete_orphaned_oac() {
            local OAC_NAME="${STACK_NAME}-oac"
            local OAC_ID
            # The JMESPath expression `... | [0]` returns JSON null when no item matches,
            # which --output text renders as the literal string 'None'. Both guards are needed.
            OAC_ID=$(aws cloudfront list-origin-access-controls \
              --query "OriginAccessControlList.Items[?Name=='$OAC_NAME'].Id | [0]" \
              --output text 2>/dev/null || true)

            if [[ -n "$OAC_ID" && "$OAC_ID" != "None" ]]; then
              echo "Found orphaned OAC '$OAC_NAME' ($OAC_ID). Deleting..."
              local ETAG
              ETAG=$(aws cloudfront get-origin-access-control \
                --id "$OAC_ID" \
                --query "ETag" \
                --output text)
              if aws cloudfront delete-origin-access-control \
                --id "$OAC_ID" \
                --if-match "$ETAG"; then
                echo "Deleted orphaned OAC '$OAC_NAME'."
              else
                echo "WARNING: Failed to delete orphaned OAC '$OAC_NAME' ($OAC_ID). The next CloudFormation deploy may fail with AlreadyExists."
              fi
            else
              echo "No orphaned OAC '$OAC_NAME' found."
            fi
          }

          if [[ "$STATUS" == "NOT_FOUND" ]]; then
            echo "Stack does not exist. Creating a new one."
            delete_orphaned_oac
            exit 0
          fi

          echo "Current stack status: $STATUS"

          # Only unrecoverable states require a full delete before the next deploy.
          if [[ "$STATUS" == "ROLLBACK_COMPLETE" || "$STATUS" == "ROLLBACK_FAILED" ]]; then
            BUCKET=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}" \
              --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue" \
              --output text 2>/dev/null || true)

            if [[ -n "$BUCKET" && "$BUCKET" != "None" ]]; then
              echo "Emptying S3 bucket before stack delete: $BUCKET"
              aws s3 rm "s3://$BUCKET" --recursive || true
            fi

            echo "Deleting unrecoverable stack: $STACK_NAME (status: $STATUS)"
            aws cloudformation delete-stack \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}"

            aws cloudformation wait stack-delete-complete \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}"

            echo "Stack deleted. Deployment will recreate it."
            delete_orphaned_oac
          else
            echo "Stack is deployable. Continuing with in-place update."
          fi

      - name: Deploy CloudFormation stack
        run: |
          set -o pipefail

          PARAMETER_OVERRIDES=()
          DOMAIN_NAME="${{ secrets.DOMAIN_NAME }}"
          HOSTED_ZONE_ID="${{ secrets.HOSTED_ZONE_ID }}"
          ACM_CERTIFICATE_ARN="${{ secrets.ACM_CERTIFICATE_ARN }}"

          if [[ -n "$DOMAIN_NAME" && -n "$HOSTED_ZONE_ID" && -n "$ACM_CERTIFICATE_ARN" ]]; then
            echo "Custom domain mode enabled."
            PARAMETER_OVERRIDES+=("DomainName=$DOMAIN_NAME")
            PARAMETER_OVERRIDES+=("HostedZoneId=$HOSTED_ZONE_ID")
            PARAMETER_OVERRIDES+=("AcmCertificateArn=$ACM_CERTIFICATE_ARN")
          elif [[ -z "$DOMAIN_NAME" && -z "$HOSTED_ZONE_ID" && -z "$ACM_CERTIFICATE_ARN" ]]; then
            echo "Custom domain mode disabled. Deploying with CloudFront default domain."
          else
            echo "Incomplete custom domain configuration detected."
            echo "Ignoring DOMAIN_NAME / HOSTED_ZONE_ID / ACM_CERTIFICATE_ARN and deploying with CloudFront default domain."
          fi

          ARGS=(
            cloudformation deploy
            --stack-name "$STACK_NAME"
            --template-file template.yaml
            --region "${{ secrets.AWS_REGION }}"
            --capabilities CAPABILITY_NAMED_IAM
            --no-fail-on-empty-changeset
          )
          [[ ${#PARAMETER_OVERRIDES[@]} -gt 0 ]] && ARGS+=(--parameter-overrides "${PARAMETER_OVERRIDES[@]}")

          if ! aws "${ARGS[@]}"; then
            echo "CloudFormation deploy failed. Fetching diagnostic events..."

            aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}" \
              --query "Stacks[0].StackStatus" \
              --output text || true

            aws cloudformation describe-stack-events \
              --stack-name "$STACK_NAME" \
              --region "${{ secrets.AWS_REGION }}" \
              --max-items 60 \
              --query "StackEvents[?contains(ResourceStatus, 'FAILED') || contains(ResourceStatus, 'ROLLBACK')].[Timestamp,LogicalResourceId,ResourceType,ResourceStatus,ResourceStatusReason]" \
              --output table || true

            exit 1
          fi

      - name: Show CloudFormation events on failure
        if: failure()
        run: |
          aws cloudformation describe-stack-events \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --max-items 40 \
            --query "StackEvents[].{Time:Timestamp,Status:ResourceStatus,Type:ResourceType,LogicalId:LogicalResourceId,Reason:ResourceStatusReason}" \
            --output table || true

      - name: Get stack outputs
        id: cf
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Stacks[0].Outputs" \
            --output json)
          echo "bucket=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="WebsiteBucketName") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "distribution=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue')" >> $GITHUB_OUTPUT
          echo "url=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="SiteUrl") | .OutputValue')" >> $GITHUB_OUTPUT

      - name: Sync static files to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.cf.outputs.bucket }} \
            --delete \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ steps.cf.outputs.bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf.outputs.distribution }} \
            --paths "/*"

      - name: Summary
        run: echo "Deployed to ${{ steps.cf.outputs.url }}"
