name: Deploy Homepage Static

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: homepage-static
  DOMAIN_NAME: baum-berger.com
  HOSTED_ZONE_ID: Z0611219TTZX7YDE3WFE
  ACM_CERTIFICATE_ARN: arn:aws:acm:us-east-1:980815102020:certificate/ff880a23-96c9-475e-8346-0121e84e2604
  AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN || secrets.AWS_DEPLOY_ROLE_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-homepage-deploy

      - name: Smart stack cleanup
        shell: bash
        run: |
          echo "🔍 Checking existing infrastructure..."
          
          # Check if stack exists
          if aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            STACK_STATUS=$(aws cloudformation describe-stacks --stack-name "${STACK_NAME}" --region "${AWS_REGION}" --query 'Stacks[0].StackStatus' --output text)
            echo "📋 Current stack status: $STACK_STATUS"
            
            # Only delete if in failed state
            if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" || "$STACK_STATUS" == "CREATE_FAILED" || "$STACK_STATUS" == "UPDATE_ROLLBACK_COMPLETE" || "$STACK_STATUS" == "REVIEW_IN_PROGRESS" ]]; then
              echo "🗑️ Stack in failed state, cleaning up..."
              
              # Get CloudFront Distribution ID if it exists
              DIST_ID=$(aws cloudformation describe-stacks \
                --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
                --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
                --output text 2>/dev/null || echo "")
              
              if [[ -n "$DIST_ID" && "$DIST_ID" != "None" ]]; then
                echo "☁️ Disabling CloudFront Distribution: $DIST_ID"
                
                ETAG=$(aws cloudfront get-distribution --id "$DIST_ID" --query 'ETag' --output text 2>/dev/null || echo "")
                if [[ -n "$ETAG" ]]; then
                  CONFIG=$(aws cloudfront get-distribution-config --id "$DIST_ID" --query 'DistributionConfig' 2>/dev/null || echo "")
                  if [[ -n "$CONFIG" ]]; then
                    echo "$CONFIG" | jq '.Enabled = false' > /tmp/dist-config.json
                    aws cloudfront update-distribution \
                      --id "$DIST_ID" \
                      --distribution-config file:///tmp/dist-config.json \
                      --if-match "$ETAG" || true
                    
                    echo "⏳ Waiting for CloudFront to be disabled..."
                    aws cloudfront wait distribution-deployed --id "$DIST_ID" || true
                  fi
                fi
              fi
              
              echo "🗑️ Deleting failed stack..."
              aws cloudformation delete-stack --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
              aws cloudformation wait stack-delete-complete --stack-name "${STACK_NAME}" --region "${AWS_REGION}"
              echo "✅ Cleanup completed"
            else
              echo "ℹ️ Stack in good state ($STACK_STATUS), will update existing stack"
            fi
          else
            echo "ℹ️ No existing stack found, will create new one"
          fi

      - name: Deploy CloudFormation stack with automatic DNS
        shell: bash
        run: |
          echo "🚀 Deploying CloudFormation stack with automatic DNS management..."
          
          aws cloudformation deploy \
            --stack-name "${STACK_NAME}" \
            --template-file template.yaml \
            --region "${AWS_REGION}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              DomainName="${DOMAIN_NAME}" \
              HostedZoneId="${HOSTED_ZONE_ID}" \
              AcmCertificateArn="${ACM_CERTIFICATE_ARN}" \
            --no-fail-on-empty-changeset
          
          echo "✅ Stack deployment completed!"

      - name: Verify DNS and CloudFront setup
        shell: bash
        run: |
          echo "🔍 Verifying deployment..."
          
          # Get stack outputs
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)

          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)

          CLOUDFRONT_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue" \
            --output text)

          echo "📦 S3 Bucket: ${BUCKET}"
          echo "☁️ CloudFront ID: ${DIST_ID}"
          echo "🌐 Frontend URL: ${FRONTEND_URL}"
          echo "🔗 CloudFront Domain: ${CLOUDFRONT_DOMAIN}"

          # Verify DNS records
          echo "🔍 Verifying DNS records..."
          dig +short "${DOMAIN_NAME}" || echo "DNS propagation in progress..."
          dig +short "www.${DOMAIN_NAME}" || echo "WWW DNS propagation in progress..."

          echo "✅ Verification completed!"

      - name: Deploy frontend content
        shell: bash
        run: |
          echo "📦 Deploying frontend content..."
          
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)

          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" --region "${AWS_REGION}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)

          # Create sample content
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="de">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Baum Berger - Gartenbau</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
                  .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
                  h1 { color: #2c5530; text-align: center; margin-bottom: 30px; }
                  .status { background: #d4edda; color: #155724; padding: 20px; border-radius: 10px; margin: 20px 0; border-left: 5px solid #28a745; }
                  .info { background: #e7f3ff; color: #004085; padding: 15px; border-radius: 8px; margin: 15px 0; }
                  .highlight { background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; margin: 10px 0; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🌳 Baumberger </h1>
                  <div class="status">
                      ✅ Website erfolgreich deployed!<br>
                      🚀 CloudFront Distribution automatisch aktiviert<br>
                      🔒 SSL-Zertifikat automatisch konfiguriert<br>
                      🌐 DNS Records automatisch aktualisiert<br>
                      ⚡ Route 53 zeigt auf neue CloudFront Distribution
                  </div>
                  <div class="info">
                      <strong>🎯 Vollständige Automatisierung:</strong><br>
                      • CloudFormation Stack Management<br>
                      • CloudFront Distribution Lifecycle<br>
                      • Route 53 DNS Automatisierung<br>
                      • SSL/TLS Zertifikat Integration
                  </div>
                  <div class="highlight">
                      <strong>🚀 Deployment Zeit:</strong> $(date)<br>
                      <strong>🌍 Region:</strong> ${AWS_REGION}<br>
                      <strong>📋 Stack:</strong> ${STACK_NAME}
                  </div>
                  <p><strong>Willkommen bei Baum Berger</strong> - Ihrem Partner für professionelle Websites mit vollautomatisierter Cloud-Infrastruktur!</p>
              </div>
          </body>
          </html>
          EOF

          # Deploy to S3
          aws s3 sync dist/ "s3://${BUCKET}" --delete

          # Invalidate CloudFront cache
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*"

          echo "🎉 Frontend deployment completed!"
          echo "🌐 Your website is live at: https://${DOMAIN_NAME}"
          echo "🌐 WWW version: https://www.${DOMAIN_NAME}"
