name: Deploy to AWS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  STACK_NAME: homepage-static

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        if: github.event_name == 'push'
        run: |
          PARAMETER_OVERRIDES=""
          if [[ -n "${{ secrets.DOMAIN_NAME }}" ]]; then
            PARAMETER_OVERRIDES="DomainName=${{ secrets.DOMAIN_NAME }}"
          fi
          if [[ -n "${{ secrets.HOSTED_ZONE_ID }}" ]]; then
            PARAMETER_OVERRIDES="$PARAMETER_OVERRIDES HostedZoneId=${{ secrets.HOSTED_ZONE_ID }}"
          fi
          if [[ -n "${{ secrets.ACM_CERTIFICATE_ARN }}" ]]; then
            PARAMETER_OVERRIDES="$PARAMETER_OVERRIDES AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}"
          fi

          if [[ -z "$PARAMETER_OVERRIDES" ]]; then
            aws cloudformation deploy \
              --stack-name "$STACK_NAME" \
              --template-file template.yaml \
              --region "$AWS_REGION" \
              --capabilities CAPABILITY_NAMED_IAM \
              --no-fail-on-empty-changeset
          else
            aws cloudformation deploy \
              --stack-name "$STACK_NAME" \
              --template-file template.yaml \
              --region "$AWS_REGION" \
              --capabilities CAPABILITY_NAMED_IAM \
              --parameter-overrides $PARAMETER_OVERRIDES \
              --no-fail-on-empty-changeset
          fi

      - name: Get CloudFormation outputs
        if: github.event_name == 'push'
        id: cf-outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs" \
            --output json > /tmp/outputs.json
          BUCKET=$(jq -r '.[] | select(.OutputKey=="WebsiteBucketName") | .OutputValue' /tmp/outputs.json)
          DISTRIBUTION=$(jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue' /tmp/outputs.json)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution=$DISTRIBUTION" >> $GITHUB_OUTPUT

      - name: Sync to S3
        if: github.event_name == 'push'
        run: |
          aws s3 sync frontend/dist s3://${{ steps.cf-outputs.outputs.bucket }} --delete

      - name: Invalidate CloudFront
        if: github.event_name == 'push'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf-outputs.outputs.distribution }} \
            --paths '/*'

      - name: Output deployment info
        if: github.event_name == 'push'
        run: |
          echo "✅ Deployment complete"
          echo "Bucket: ${{ steps.cf-outputs.outputs.bucket }}"
          echo "Distribution: ${{ steps.cf-outputs.outputs.distribution }}"
